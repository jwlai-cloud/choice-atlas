name: Only dev may merge to main

on:
  pull_request:
    branches: [main]

jobs:
  enforce-source:
    name: Require dev source branch
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-dev pull requests
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Pull requests into main must originate from dev."
            exit 1
          fi
          echo "Verified source branch: dev"
