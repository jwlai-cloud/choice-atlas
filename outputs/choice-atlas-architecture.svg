  <g transform="translate(110 770)"><rect width="1690" height="180" fill="#1e2a27"/><text x="34" y="58" fill="#e5d3a0" font-family="monospace" font-size="18" letter-spacing="2">WHY THIS MATTERS</text><text x="34" y="123" fill="#fffdf6" font-family="Georgia,serif" font-size="39">A family gets a clearer conversation—not a machine-made answer.</text><text x="1210" y="58" fill="#b9c7be" font-family="monospace" font-size="18">CODEX-BUILT · 34 TESTS · LIVE PATH</text><text x="1210" y="113" fill="#fffdf6" font-family="Georgia,serif" font-size="28">“Not yet” is allowed.</text></g>
