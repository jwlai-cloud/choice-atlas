    <circle cx="164" cy="424" r="25" fill="#d8e1d9" stroke="#496b83" stroke-width="2"/>
    <text x="208" y="427" font-size="30">1. Set the field</text><text x="142" y="492" font-size="22">Two routes</text><text x="142" y="531" font-size="22">Priorities</text><text x="142" y="570" font-size="22">Time horizon</text><text x="142" y="625" fill="#647068" font-family="Arial" font-size="17">A dilemma stays editable.</text>
